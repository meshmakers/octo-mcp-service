# Root-level CI pipeline for octo-mcp-service, using shared templates from
# octo-pipeline-templates@tpl-v0.3.1.
#
# Phase 6 (2026-06-13) Pro-tier migration. Image:
# meshmakers/octo-mesh-mcp-services. Helm chart `octo-mesh-mcp` lives in
# octo-helm-pro (split out of octo-mesh-ai in commit 4e6a201). No NuGet
# output — the MCP server is consumed only as a deployed pod.
#
# Replaces devops-build/azure-pipelines.yml (legacy, slated for cleanup
# once a green r-tag run lands here).

name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

resources:
  repositories:
    - repository: pipelineTemplates
      type: github
      name: meshmakers/octo-pipeline-templates
      endpoint: meshmakers-access-token
      ref: refs/tags/tpl-v0.4.6

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.McpServices.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    jobs:
      - job: buildMcpServices
        displayName: 'Build, test, push docker image'
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: templates/steps/update-build-number.yml@pipelineTemplates
          - checkout: self
            clean: true
          - template: templates/steps/set-version.yml@pipelineTemplates
          - template: templates/steps/download-ca.yml@pipelineTemplates
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(solutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: $(solutionFile)
              arguments: '--no-restore --configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
              publishWebProjects: false
              zipAfterPublish: false
              modifyOutputPath: false
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--no-build --configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
                !**/*SystemTests.csproj
              testRunTitle: 'CI'
          - template: templates/steps/build-and-push-docker.yml@pipelineTemplates
            parameters:
              publicRegistryServiceConnection: $(DockerRegistryPublicConnection)
              privateRegistryName: $(DockerRegistryPrivateUri)
              repository: meshmakers/octo-mesh-mcp-services
              dockerfile: src/McpServices/Dockerfile
              enableMainLatestTag: true
          - template: templates/steps/handle-artifacts.yml@pipelineTemplates
